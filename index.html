<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Expensive Petroleum 🪄</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --navy:         #1F2933;
  --navy-60:      #7B8794;
  --navy-30:      #CBD2D9;
  --navy-10:      #F5F6F7;
  --white:        #ffffff;
  --amber:        #F2C94C;
  --amber-text:   #946C00;
  --amber-bg:     #FEFAEC;
  --amber-border: #F2C94C;
  --border:       #E4E7EB;
  --cheap:        #16a34a;
  --mid:          #b45309;
  --pricey:       #dc2626;
  --mono: ui-monospace,'SF Mono','Cascadia Mono',Menlo,monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; width:100%; overflow:hidden; }
body { font-family:var(--mono); background:var(--navy-10); color:var(--navy); font-size:13px; line-height:1.5; -webkit-font-smoothing:antialiased; }

/* MAP */
#map { position:fixed; inset:0; z-index:0; }

/* FAB */
.fab {
  position:fixed; bottom:24px; right:20px; z-index:1000;
  width:54px; height:54px; border-radius:50%;
  background:var(--navy); border:3px solid var(--amber);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:1.35rem;
  box-shadow:0 4px 16px rgba(31,41,51,.35);
  transition:transform .18s, background .18s;
}
.fab:hover { transform:scale(1.07); }
.fab:active { transform:scale(.94); }
.fab.open { background:var(--navy); }
.fab-dot {
  position:absolute; top:4px; right:4px;
  width:9px; height:9px;
  background:var(--amber); border-radius:50%;
  border:2px solid var(--navy);
  animation:blink 2s ease-in-out infinite;
}
.fab.open .fab-dot { display:none; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* PANEL */
.panel {
  position:fixed; bottom:90px; right:16px; z-index:999;
  width:min(360px, calc(100vw - 32px));
  background:var(--white);
  border:2px solid var(--border);
  border-top:3px solid var(--amber);
  border-radius:3px;
  box-shadow:0 8px 28px rgba(31,41,51,.18);
  overflow:hidden;
  transform:scale(.87) translateY(14px);
  opacity:0; pointer-events:none;
  transition:transform .22s cubic-bezier(.34,1.4,.64,1), opacity .18s;
  transform-origin:bottom right;
}
.panel.open { transform:scale(1) translateY(0); opacity:1; pointer-events:all; }

.panel-head {
  background:var(--navy);
  border-bottom:3px solid var(--amber);
  padding:11px 14px;
  display:flex; align-items:center; justify-content:space-between;
}
.panel-logo {
  font-family:var(--sans); font-weight:800; font-size:.92rem;
  color:var(--white); letter-spacing:2.5px; text-transform:uppercase;
  display:flex; align-items:center; gap:8px;
}
.panel-logo-dot {
  width:7px; height:7px; background:var(--amber); border-radius:50%;
  animation:blink 2s ease-in-out infinite;
}
.live-pill {
  font-family:var(--mono); font-size:.58rem;
  background:var(--amber); color:var(--navy);
  padding:3px 8px; border-radius:2px;
  letter-spacing:.08em; text-transform:uppercase; font-weight:700;
}

.panel-body { padding:13px; display:flex; flex-direction:column; gap:9px; }

/* Postcode row */
.pc-row { display:flex; gap:7px; align-items:stretch; }
.pc-wrap { position:relative; flex:1; }
.pc-input {
  width:100%; background:var(--navy-10);
  border:1.5px solid var(--border);
  color:var(--navy); font-family:var(--mono);
  font-size:.82rem; font-weight:600;
  letter-spacing:.06em; text-transform:uppercase;
  padding:10px 32px 10px 11px; border-radius:3px;
  outline:none; transition:border-color .15s, background .15s;
}
.pc-input::placeholder {
  text-transform:none; font-weight:400; font-size:.7rem;
  letter-spacing:0; color:var(--navy-60);
}
.pc-input:focus { border-color:var(--amber); background:var(--white); }
.pc-clear {
  position:absolute; right:8px; top:50%; transform:translateY(-50%);
  background:none; border:none; color:var(--navy-60);
  font-size:.82rem; cursor:pointer; padding:2px; display:none; line-height:1;
}
.pc-clear.show { display:block; }
.gps-btn {
  background:var(--navy); border:1.5px solid var(--amber);
  color:var(--amber); font-size:1rem;
  padding:0 13px; border-radius:3px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:background .15s, color .15s;
}
.gps-btn:hover { background:var(--amber); color:var(--navy); }

/* Controls row */
.ctrl-row { display:flex; gap:7px; align-items:stretch; }
select.ctl {
  flex:1; background:var(--navy-10);
  border:1.5px solid var(--border);
  color:var(--navy); font-family:var(--mono);
  font-size:.7rem; padding:9px 7px;
  border-radius:3px; outline:none; cursor:pointer; min-width:0;
  transition:border-color .12s;
}
select.ctl:focus { border-color:var(--amber); }
.search-btn {
  background:var(--amber); color:var(--navy); border:none;
  font-family:var(--sans); font-weight:800; font-size:.72rem;
  letter-spacing:.04em; text-transform:uppercase;
  padding:9px 16px; border-radius:3px;
  cursor:pointer; transition:opacity .15s; white-space:nowrap; flex-shrink:0;
}
.search-btn:hover { opacity:.88; }
.search-btn:disabled { opacity:.35; cursor:not-allowed; }

/* Error */
.err-msg {
  background:#fee2e2; color:#dc2626;
  border:1.5px solid #fca5a5; border-left:3px solid #dc2626;
  padding:7px 10px; border-radius:3px;
  font-size:.68rem; line-height:1.5; display:none;
}

/* Results pill */
.results-pill {
  background:var(--amber-bg);
  border:1.5px solid var(--amber-border); border-left:3px solid var(--amber);
  border-radius:3px; padding:5px 10px;
  display:none; align-items:center; gap:6px;
}
.results-pill.show { display:flex; }
.pill-count {
  font-family:var(--mono); font-weight:700; font-size:.65rem;
  color:var(--amber-text); text-transform:uppercase; letter-spacing:.08em;
}

/* DRAWER */
.drawer {
  position:fixed; bottom:0; left:0; right:0; z-index:998;
  background:var(--white);
  border-top:3px solid var(--amber);
  box-shadow:0 -4px 20px rgba(31,41,51,.14);
  transform:translateY(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  max-height:55vh; display:flex; flex-direction:column;
}
.drawer.open { transform:translateY(0); }
.drawer-handle {
  width:30px; height:3px; background:var(--amber);
  border-radius:2px; margin:9px auto 0;
  flex-shrink:0; cursor:pointer;
}
.drawer-header {
  padding:8px 14px 7px; border-bottom:1.5px solid var(--border);
  flex-shrink:0; display:flex; align-items:center; justify-content:space-between;
  background:var(--navy-10);
}
.drawer-title {
  font-family:var(--mono); font-weight:700; font-size:.65rem;
  text-transform:uppercase; letter-spacing:.1em; color:var(--amber-text);
}
.drawer-close {
  background:none; border:none; font-size:.95rem;
  color:var(--navy-60); cursor:pointer; padding:2px 6px; border-radius:2px;
}
.drawer-close:hover { background:var(--border); }
select.pill-sort {
  background:var(--white); border:1.5px solid var(--border);
  color:var(--navy); font-family:var(--mono); font-size:.62rem;
  padding:4px 7px; border-radius:3px; outline:none; cursor:pointer;
  transition:border-color .12s;
}
select.pill-sort:focus { border-color:var(--amber); }
.drawer-list { overflow-y:auto; flex:1; -webkit-overflow-scrolling:touch; }

/* STATION CARD */
.card {
  padding:10px 14px; border-bottom:1.5px solid var(--border);
  cursor:pointer; transition:background .1s;
  display:grid; grid-template-columns:1fr auto; gap:8px; align-items:start;
}
.card:hover { background:var(--amber-bg); }
.card.on { background:var(--amber-bg); border-left:3px solid var(--amber); padding-left:11px; }
.c-rank {
  font-family:var(--mono); font-size:.55rem;
  color:var(--amber-text); margin-bottom:2px;
  letter-spacing:.06em; text-transform:uppercase; font-weight:700;
}
.c-brand { font-family:var(--sans); font-weight:700; font-size:.82rem; margin-bottom:2px; color:var(--navy); }
.c-addr { font-size:.62rem; color:var(--navy-60); line-height:1.4; margin-bottom:4px; }
.c-meta { display:flex; align-items:center; gap:4px; flex-wrap:wrap; }
.c-dist {
  font-family:var(--mono); font-size:.55rem;
  background:var(--navy-10); border:1px solid var(--border);
  color:var(--navy-60); padding:2px 5px; border-radius:2px;
}
.c-chip {
  font-family:var(--mono); font-size:.53rem;
  padding:2px 5px; border-radius:2px;
  border:1px solid var(--amber-border);
  color:var(--amber-text); background:var(--amber-bg);
}
.pcol { text-align:right; }
.mprice { font-family:var(--sans); font-weight:800; font-size:1.25rem; line-height:1; }
.cheap  { color:var(--cheap); }
.mid    { color:var(--mid); }
.pricey { color:var(--pricey); }
.punit  { font-family:var(--mono); font-size:.53rem; color:var(--navy-60); display:block; margin:2px 0 3px; }
.ptag   { font-family:var(--mono); font-size:.52rem; font-weight:700; padding:2px 6px; border-radius:2px; text-transform:uppercase; letter-spacing:.05em; display:inline-block; }
.tag-cheap  { background:#dcfce7; color:#15803d; border:1px solid #86efac; }
.tag-mid    { background:#fde68a; color:#92400e; border:1px solid #fbbf24; }
.tag-pricey { background:#fee2e2; color:#dc2626; border:1px solid #fca5a5; }
.others { margin-top:3px; }
.orow { display:flex; justify-content:space-between; font-family:var(--mono); font-size:.53rem; color:var(--navy-60); gap:5px; margin-top:1px; }
.oval { font-weight:600; color:var(--navy); }

/* LOADING */
.loading-overlay {
  position:fixed; inset:0; z-index:2000;
  background:rgba(31,41,51,.65); backdrop-filter:blur(3px);
  display:none; align-items:center; justify-content:center; flex-direction:column; gap:12px;
}
.loading-overlay.show { display:flex; }
.spin-ring {
  width:34px; height:34px;
  border:3px solid rgba(242,201,76,.2); border-top-color:var(--amber);
  border-radius:50%; animation:spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-label {
  font-family:var(--mono); color:var(--amber);
  font-size:.7rem; letter-spacing:.1em; text-transform:uppercase;
}

/* LEAFLET POPUP */
.leaflet-popup-content-wrapper {
  border-radius:3px !important;
  font-family:var(--mono) !important;
  box-shadow:0 4px 20px rgba(31,41,51,.2) !important;
  border-top:3px solid var(--amber) !important;
  padding:0 !important;
}
.leaflet-popup-content { margin:0 !important; }
.leaflet-popup-close-button { top:8px !important; right:10px !important; color:var(--navy-60) !important; }
</style>
</head>
<body>

<div id="map"></div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spin-ring"></div>
  <div class="loading-label">Finding stations…</div>
</div>

<button class="fab" id="fab" onclick="togglePanel()" title="Expensive Petroleum 🪄">
  <span>⛽</span>
  <div class="fab-dot"></div>
</button>

<div class="panel" id="panel">
  <div class="panel-head">
    <div class="panel-logo"><div class="panel-logo-dot"></div>🪄 Expensive Petroleum</div>
    <div class="live-pill">"Expensive Petroleum" — Ron Weasley</div>
  </div>
  <div class="panel-body">
    <div class="pc-row">
      <div class="pc-wrap">
        <input class="pc-input" id="pcInput"
          placeholder="Enter postcode e.g. SW1A 2AA"
          maxlength="10" autocorrect="off" autocapitalize="characters"
          spellcheck="false" autocomplete="postal-code"
          oninput="onPcInput(this)"/>
        <button class="pc-clear" id="pcClear" onclick="clearPc()">✕</button>
      </div>
      <button class="gps-btn" onclick="useGPS()" title="Use my location">📍</button>
    </div>
    <div class="ctrl-row">
      <select class="ctl" id="fuelSel">
        <option value="E10">Petrol (E10)</option>
        <option value="E5">Super (E5)</option>
        <option value="B7">Diesel (B7)</option>
        <option value="SDV">Super Diesel</option>
      </select>
      <select class="ctl" id="radSel">
        <option value="3">3 mi</option>
        <option value="5" selected>5 mi</option>
        <option value="10">10 mi</option>
        <option value="20">20 mi</option>
      </select>
      <button class="search-btn" id="btnSearch" onclick="doSearch()">Search</button>
    </div>
    <div class="err-msg" id="errMsg"></div>
    <div class="results-pill" id="resultsPill">
      <span class="pill-count" id="pillCount"></span>
    </div>
  </div>
</div>

<div class="drawer" id="drawer">
  <div class="drawer-handle" onclick="toggleDrawer()"></div>
  <div class="drawer-header">
    <span class="drawer-title" id="drawerTitle">Stations</span>
    <div style="display:flex;align-items:center;gap:8px">
      <select class="pill-sort" id="sortSel" onchange="renderResults()">
        <option value="price">Cheapest first</option>
        <option value="dist">Nearest first</option>
      </select>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
  </div>
  <div class="drawer-list" id="drawerList"></div>
</div>

<script>
const map = L.map('map', { zoomControl:false }).setView([52.04,-0.76],11);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'© OpenStreetMap © CARTO', subdomains:'abcd', maxZoom:19
}).addTo(map);
L.control.zoom({ position:'topright' }).addTo(map);

let allStations=[], sorted=[], markers=[], circle=null;
let panelOpen=false, drawerOpen=false;

function getPrice(s, fuel) {
  fuel = fuel || document.getElementById('fuelSel').value;
  if (s.price && +s.price > 50) return +s.price;
  if (s.prices) {
    const p=s.prices;
    const keys={E10:['E10','e10'],E5:['E5','e5'],B7:['B7','b7'],SDV:['SDV','sdv']};
    for (const k of keys[fuel]||[]) { if (p[k]&&+p[k]>50) return +p[k]; }
  }
  for (const [,v] of Object.entries(s)) {
    if (typeof v==='number'&&v>50&&v<400) return v;
  }
  return null;
}

function getAllFuelPrices(s) {
  const labels={E10:'Petrol',E5:'Super',B7:'Diesel',SDV:'SDV'};
  const result=[];
  if (s.prices) {
    for (const [k,label] of Object.entries(labels)) {
      const v=s.prices[k]; if (v&&+v>50) result.push({key:k,label,val:+v});
    }
  }
  if (!result.length) {
    for (const [k,label] of Object.entries(labels)) {
      if (s[k]&&+s[k]>50) result.push({key:k,label,val:+s[k]});
    }
  }
  return result;
}

function pCol(p) { return !p?'#aaa':p<=148?'#16a34a':p<=158?'#b45309':'#dc2626'; }
function pCls(p) { return !p?'':p<=148?'cheap':p<=158?'mid':'pricey'; }
function pTag(price, prices) {
  if (!price||!prices.length) return null;
  const mn=Math.min(...prices), mx=Math.max(...prices);
  const pos=mx===mn?0.5:(price-mn)/(mx-mn);
  if (pos<=.33) return ['tag-cheap','Cheapest'];
  if (pos<=.66) return ['tag-mid','Average'];
  return ['tag-pricey','Pricey'];
}

function mkIcon(price, active) {
  const col=pCol(price), sz=active?40:32, fs=active?8.5:7.5;
  const lbl=price?price.toFixed(1)+'p':'?';
  const border=active?'#F2C94C':col;
  return L.divIcon({
    className:'',
    html:`<div style="position:relative;width:${sz}px;height:${sz}px;filter:drop-shadow(${active?'0 3px 8px rgba(242,201,76,.5)':'0 1px 4px rgba(0,0,0,.22)'})">`
      +`<div style="position:absolute;inset:0;background:${col};border:2px solid ${border};border-radius:50% 50% 50% 0;transform:rotate(-45deg)"></div>`
      +`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding-bottom:3px;color:#fff;font-family:Arial,sans-serif;font-weight:700;font-size:${fs}px;line-height:1;text-shadow:0 1px 2px rgba(0,0,0,.4)">${lbl}</div>`
      +`</div>`,
    iconSize:[sz,sz], iconAnchor:[sz/2,sz]
  });
}

function shortBrand(s) {
  const first=(s.brand||s.name||'').split(' ')[0];
  return first.length>7?first.slice(0,6)+'.':first;
}

function buildPopup(s) {
  const fuel=document.getElementById('fuelSel').value;
  const LABELS={E10:'Petrol',E5:'Super',B7:'Diesel',SDV:'SDV'};
  const rows=[];
  if (s.prices&&typeof s.prices==='object') {
    for (const [k,label] of Object.entries(LABELS)) {
      const v=s.prices[k]; if (v&&+v>50&&+v<400) rows.push({label,val:+v,key:k});
    }
  }
  if (!rows.length) {
    for (const [k,label] of Object.entries(LABELS)) {
      const v=s[k]; if (v&&+v>50&&+v<400) rows.push({label,val:+v,key:k});
    }
  }
  if (!rows.length&&s.price&&+s.price>50) rows.push({label:LABELS[fuel]||fuel,val:+s.price,key:fuel});

  const priceRows=rows.map(({label,val,key})=>
    `<div style="display:flex;justify-content:space-between;gap:14px;padding:4px 0;border-bottom:1px solid #E4E7EB;font-size:.72rem">
      <span style="color:#7B8794;font-family:ui-monospace,monospace;font-size:.65rem;text-transform:uppercase;letter-spacing:.04em">${label}${key===fuel?' ✓':''}</span>
      <span style="font-weight:700;color:${pCol(val)}">${val.toFixed(1)}p</span>
    </div>`
  ).join('');

  const updated=s.price_updated
    ?`<div style="font-size:.55rem;color:#CBD2D9;margin-top:7px;font-family:ui-monospace,monospace">Updated ${new Date(s.price_updated).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</div>`
    :'';

  return `<div style="font-family:ui-monospace,monospace;padding:12px 14px;min-width:190px">
    <div style="font-family:-apple-system,sans-serif;font-weight:800;font-size:.88rem;margin-bottom:1px;color:#1F2933">${s.brand||s.name||'Station'}</div>
    <div style="font-size:.6rem;color:#7B8794;margin-bottom:8px;line-height:1.4">${s.address||''}</div>
    ${priceRows||`<div style="color:#CBD2D9;font-size:.68rem">No price data</div>`}
    ${updated}
  </div>`;
}

function renderResults() {
  const fuel=document.getElementById('fuelSel').value;
  const by=document.getElementById('sortSel').value;
  const prices=allStations.map(s=>getPrice(s,fuel)).filter(Boolean);

  sorted=[...allStations].sort((a,b)=>
    by==='price'?(getPrice(a,fuel)||999)-(getPrice(b,fuel)||999):(a.distance||999)-(b.distance||999)
  );

  markers.forEach(m=>{ if(m){if(m._labelMarker)map.removeLayer(m._labelMarker);map.removeLayer(m);} });
  markers=[];

  document.getElementById('pillCount').textContent=`${sorted.length} station${sorted.length!==1?'s':''}`;
  document.getElementById('resultsPill').classList.add('show');
  document.getElementById('drawerTitle').textContent=`${sorted.length} Station${sorted.length!==1?'s':''} nearby`;

  const list=document.getElementById('drawerList');
  list.innerHTML='';

  sorted.forEach((s,i)=>{
    const price=getPrice(s,fuel), cls=pCls(price), tag=pTag(price,prices);
    const fuelPrices=getAllFuelPrices(s);
    const chips=fuelPrices.map(({label})=>`<span class="c-chip">${label}</span>`).join('');
    const others=fuelPrices.filter(({key})=>key!==fuel)
      .map(({label,val})=>`<div class="orow"><span>${label}</span><span class="oval">${val.toFixed(1)}p</span></div>`).join('');

    const card=document.createElement('div');
    card.className='card'; card.dataset.i=i;
    card.innerHTML=`
      <div>
        <div class="c-rank">#${i+1}</div>
        <div class="c-brand">${s.brand||s.name||'Station'}</div>
        <div class="c-addr">${s.address||''}</div>
        <div class="c-meta">
          ${s.distance!=null?`<span class="c-dist">${(+s.distance).toFixed(1)} mi</span>`:''}
          ${chips}
        </div>
      </div>
      <div class="pcol">
        ${price
          ?`<div class="mprice ${cls}">${price.toFixed(1)}</div><span class="punit">p/litre</span>${tag?`<span class="ptag ${tag[0]}">${tag[1]}</span>`:''}`
          :`<div style="color:var(--navy-60);font-size:.7rem;margin-top:4px">—</div>`}
        <div class="others">${others}</div>
      </div>`;
    card.addEventListener('click',()=>selectStation(i));
    list.appendChild(card);

    if (s.lat&&s.lng) {
      const mk=L.marker([+s.lat,+s.lng],{icon:mkIcon(price,false)});
      const brand=shortBrand(s);
      if (brand) {
        const lbl=L.divIcon({
          className:'',
          html:`<div style="font-family:-apple-system,sans-serif;font-weight:700;font-size:8px;color:#1F2933;background:rgba(254,250,236,.92);border:1px solid #F2C94C;padding:1px 4px;border-radius:2px;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.12);margin-top:2px">${brand}</div>`,
          iconSize:[60,16], iconAnchor:[30,0]
        });
        const lm=L.marker([+s.lat,+s.lng],{icon:lbl,interactive:false,zIndexOffset:-100});
        lm.addTo(map); mk._labelMarker=lm;
      }
      mk.bindPopup(buildPopup(s),{maxWidth:250});
      mk.on('click',()=>selectStation(i));
      mk.addTo(map); markers.push(mk);
    } else markers.push(null);
  });

  openDrawer();
}

function selectStation(i) {
  document.querySelectorAll('.card').forEach((c,idx)=>c.classList.toggle('on',idx===i));
  const fuel=document.getElementById('fuelSel').value;
  markers.forEach((m,idx)=>{ if(m) m.setIcon(mkIcon(getPrice(sorted[idx],fuel),idx===i)); });
  const mk=markers[i];
  if (mk) { map.panTo(mk.getLatLng(),{animate:true}); setTimeout(()=>mk.openPopup(),300); }
  document.querySelector(`.card[data-i="${i}"]`)?.scrollIntoView({behavior:'smooth',block:'nearest'});
  closePanel();
}

async function resolvePostcode(raw) {
  const q=raw.trim().toUpperCase(), s=q.replace(/\s+/g,'');
  const candidates=new Set();
  if (s.length>=5) candidates.add(s.slice(0,s.length-3)+' '+s.slice(-3));
  candidates.add(q); candidates.add(s);
  for (const pc of candidates) {
    try {
      const r=await fetch(`https://api.postcodes.io/postcodes/${encodeURIComponent(pc)}`);
      const d=await r.json();
      if (d.status===200) return {lat:d.result.latitude,lng:d.result.longitude};
    } catch(_){}
  }
  try {
    const r=await fetch(`https://nominatim.openstreetmap.org/search?postalcode=${encodeURIComponent(s)}&countrycodes=gb&format=json&limit=1`,{headers:{'Accept-Language':'en','User-Agent':'PumpCheck/1.0'}});
    const d=await r.json();
    if (d?.length) return {lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon)};
  } catch(_){}
  const out=s.length>3?s.slice(0,s.length-3):s;
  try {
    const r=await fetch(`https://api.postcodes.io/postcodes/${encodeURIComponent(out)}/autocomplete`);
    const d=await r.json();
    if (d.status===200&&d.result?.length) {
      const r2=await fetch(`https://api.postcodes.io/postcodes/${encodeURIComponent(d.result[0])}`);
      const d2=await r2.json();
      if (d2.status===200) return {lat:d2.result.latitude,lng:d2.result.longitude};
    }
  } catch(_){}
  throw new Error(`"${q}" not found. Please check the postcode.`);
}

async function doSearch(oLat, oLng) {
  hideErr(); showLoading(true);
  allStations=[]; sorted=[];
  markers.forEach(m=>{if(m){if(m._labelMarker)map.removeLayer(m._labelMarker);map.removeLayer(m);}});
  markers=[];
  if (circle){map.removeLayer(circle);circle=null;}
  document.getElementById('resultsPill').classList.remove('show');
  try {
    let lat=oLat, lng=oLng;
    if (lat==null) {const loc=await resolvePostcode(document.getElementById('pcInput').value);lat=loc.lat;lng=loc.lng;}
    const fuel=document.getElementById('fuelSel').value;
    const radius=document.getElementById('radSel').value;
    const url=`/.netlify/functions/stations?lat=${lat}&lng=${lng}&fuel=${fuel}&radius=${radius}`;
    const r=await fetch(url);
    if (!r.ok) throw new Error(`Price service error (${r.status}). Try again shortly.`);
    const raw=await r.json();
    const list=(raw.stations||raw||[]).filter(s=>s?.lat&&s?.lng);
    if (!list.length) throw new Error(`No stations found within ${radius} miles. Try a wider radius.`);
    allStations=list;
    circle=L.circle([lat,lng],{radius:+radius*1609.34,color:'#F2C94C',weight:1.5,opacity:.4,fillColor:'#F2C94C',fillOpacity:.04}).addTo(map);
    const zoom=+radius<=3?13:+radius<=5?12:+radius<=10?11:10;
    map.setView([lat,lng],zoom,{animate:true});
    renderResults(); closePanel();
  } catch(e) {
    showErr(e.message||'Something went wrong.');
  }
  showLoading(false);
}

function useGPS() {
  if (!navigator.geolocation){showErr('Geolocation not supported.');return;}
  hideErr(); showLoading(true);
  navigator.geolocation.getCurrentPosition(
    p=>doSearch(p.coords.latitude,p.coords.longitude),
    ()=>{showErr('Could not get location. Enter a postcode instead.');showLoading(false);}
  );
}

function togglePanel(){panelOpen?closePanel():openPanel();}
function openPanel(){document.getElementById('panel').classList.add('open');document.getElementById('fab').classList.add('open');document.getElementById('fab').querySelector('span').textContent='✕';panelOpen=true;}
function closePanel(){document.getElementById('panel').classList.remove('open');document.getElementById('fab').classList.remove('open');document.getElementById('fab').querySelector('span').textContent='⛽';panelOpen=false;}
function openDrawer(){document.getElementById('drawer').classList.add('open');drawerOpen=true;}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');drawerOpen=false;}
function toggleDrawer(){drawerOpen?closeDrawer():openDrawer();}

function showLoading(on){
  document.getElementById('loadingOverlay').classList.toggle('show',on);
  document.getElementById('btnSearch').disabled=on;
  document.getElementById('btnSearch').textContent=on?'…':'Search';
}
function showErr(m){const e=document.getElementById('errMsg');e.textContent='⚠ '+m;e.style.display='block';if(!panelOpen)openPanel();}
function hideErr(){document.getElementById('errMsg').style.display='none';}
function onPcInput(el){document.getElementById('pcClear').classList.toggle('show',el.value.length>0);}
function clearPc(){document.getElementById('pcInput').value='';document.getElementById('pcClear').classList.remove('show');document.getElementById('pcInput').focus();}

document.getElementById('pcInput').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();doSearch();}});
map.on('click',()=>{if(panelOpen)closePanel();});
window.addEventListener('load',()=>setTimeout(openPanel,400));
</script>
